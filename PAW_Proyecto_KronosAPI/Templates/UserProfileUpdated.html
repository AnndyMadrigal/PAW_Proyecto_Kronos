<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil actualizado</title>
</head>
<body style="margin:0;padding:0;background:#f6f8fb;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f6f8fb;padding:24px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;background:#ffffff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;">
                    <tr>
                        <td style="padding:24px 28px;background:#2563eb;color:#ffffff;">
                            <h1 style="margin:0;font-size:22px;line-height:1.3;">Tu perfil fue actualizado</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:28px;">
                            <p style="margin:0 0 12px 0;font-size:15px;line-height:1.6;">Hola {{Name}},</p>
                            <p style="margin:0 0 12px 0;font-size:15px;line-height:1.6;">El administrador actualizó tu perfil en Kronos.</p>
                            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;margin:16px 0;">
                                <tr>
                                    <td style="padding:10px 12px;border:1px solid #e5e7eb;background:#f9fafb;font-weight:bold;">Rol</td>
                                    <td style="padding:10px 12px;border:1px solid #e5e7eb;">{{Role}}</td>
                                </tr>
                                <tr>
                                    <td style="padding:10px 12px;border:1px solid #e5e7eb;background:#f9fafb;font-weight:bold;">Estado</td>
                                    <td style="padding:10px 12px;border:1px solid #e5e7eb;">{{Status}}</td>
                                </tr>
                            </table>
                            <p style="margin:0;font-size:15px;line-height:1.6;">Si tu acceso fue desactivado o tu perfil cambió, inicia sesión de nuevo para continuar.</p>
                            <p style="margin:18px 0 0 0;font-size:12px;color:#6b7280;">Kronos {{Year}}</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
